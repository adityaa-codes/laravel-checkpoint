name: release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Run release-please
        uses: googleapis/release-please-action@v4
        with:
          release-type: php
          package-name: adityaa-codes/laravel-checkpoint
